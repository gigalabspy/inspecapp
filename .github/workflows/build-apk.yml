name: Build APK Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://inspecapp.onrender.com
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Compilar frontend (Vite)
        working-directory: frontend
        run: npm run build

      - name: Generar proyecto Android nativo
        working-directory: frontend
        run: npx cap add android

      - name: Sincronizar Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Compilar APK debug
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Publicar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: inspecapp-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
